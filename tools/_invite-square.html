<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Invite Square</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />
<style>
  :root { --orange:#E7552C; --wine:#811D16; --pink:#F4BABB; --cream:#F9F5ED; --gold:#D6C774; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1080px;height:1080px;overflow:hidden;background:var(--wine);font-family:'Poppins',sans-serif;-webkit-font-smoothing:antialiased}
  body{position:relative;color:var(--cream)}
  .blob{position:absolute;border-radius:50%;filter:blur(70px);pointer-events:none}
  .b1{background:var(--pink);opacity:.18;width:600px;height:600px;bottom:-250px;left:-200px}
  .b2{background:var(--gold);opacity:.10;width:500px;height:500px;top:40%;right:-150px}
  .photo{position:absolute;right:60px;top:60px;width:420px;height:540px;border-radius:28px;overflow:hidden;box-shadow:0 30px 60px -20px rgba(0,0,0,.5)}
  .photo img{width:100%;height:100%;object-fit:cover}
  .spark{position:absolute;color:var(--gold)}
  .s1{top:50px;right:510px;font-size:28px;transform:rotate(15deg)}
  .s2{top:35%;left:60px;font-size:22px;opacity:.7}
  .s3{bottom:22%;left:540px;font-size:18px;opacity:.5}
  .s4{bottom:80px;right:80px;font-size:32px}
  .content{position:absolute;inset:0;padding:80px 80px 70px;display:flex;flex-direction:column}
  .logo{width:84px;height:84px;border-radius:18px;overflow:hidden;border:2px solid rgba(249,245,237,.18)}
  .logo img{width:100%;height:100%;object-fit:cover}
  .eyebrow{color:var(--gold);font-size:14px;font-weight:500;letter-spacing:.35em;text-transform:uppercase;margin-top:250px}
  .title{margin-top:18px;max-width:560px}
  .title .l1{font-size:56px;font-weight:600;line-height:1.02;letter-spacing:-.04em;color:var(--cream)}
  .title .l2{font-size:56px;font-weight:500;line-height:1.02;letter-spacing:-.04em;color:var(--pink);font-style:italic;margin-top:4px}
  .tagline{margin-top:18px;font-style:italic;color:var(--gold);font-size:18px}
  .date-row{margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between;gap:30px}
  .date{display:flex;align-items:flex-end;gap:18px}
  .date .num{font-size:180px;font-weight:700;line-height:.85;color:var(--gold);letter-spacing:-.06em}
  .date .meta{padding-bottom:14px}
  .date .meta .month{font-size:30px;font-weight:600;line-height:1;letter-spacing:-.02em}
  .date .meta .year{font-size:14px;color:rgba(249,245,237,.6);letter-spacing:.25em;margin-top:4px}
  .info{text-align:right;padding-bottom:14px}
  .info .label{font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:rgba(249,245,237,.55);margin-bottom:4px}
  .info .v{font-size:18px;font-weight:500;color:var(--cream);line-height:1.3}
  .info .v + .label{margin-top:12px}
  .cta{margin-top:40px;padding-top:24px;border-top:1px solid rgba(249,245,237,.18);display:flex;justify-content:space-between;align-items:center;color:rgba(249,245,237,.65);font-size:13px;letter-spacing:.2em;text-transform:uppercase}
  .cta .domain{color:var(--gold)}
</style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="photo"><img src="src/assets/images/about.jpg" alt="" /></div>
  <span class="spark s1">✦</span>
  <span class="spark s2">✦</span>
  <span class="spark s3">✦</span>
  <span class="spark s4">✦</span>
  <div class="content">
    <div class="logo"><img src="src/assets/logos/logo-instagram.jpg" alt="" /></div>
    <p class="eyebrow">Próximo evento</p>
    <div class="title">
      <div class="l1">Sculpt Society</div>
      <div class="l2">Hannah Montana Edition</div>
    </div>
    <p class="tagline">"Lo mejor de ambos mundos" ✦</p>
    <div class="date-row">
      <div class="date">
        <div class="num">13</div>
        <div class="meta"><div class="month">Junio</div><div class="year">2026</div></div>
      </div>
      <div class="info">
        <div class="label">Hora</div><div class="v">10:00 a.m.</div>
        <div class="label">Inversión</div><div class="v">₡20.000</div>
      </div>
    </div>
    <div class="cta"><span>Paloma Studios · Escazú</span><span class="domain">sculptsocietycr.com</span></div>
  </div>
</body>
</html>
