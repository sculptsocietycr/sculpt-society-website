<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Invite Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />
<style>
  :root { --orange:#E7552C; --wine:#811D16; --pink:#F4BABB; --cream:#F9F5ED; --gold:#D6C774; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1080px;height:1920px;overflow:hidden;background:var(--wine);font-family:'Poppins',sans-serif;-webkit-font-smoothing:antialiased}
  body{position:relative;color:var(--cream)}
  .blob{position:absolute;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:1}
  .b1{background:var(--pink);opacity:.15;width:800px;height:800px;bottom:-200px;right:-300px}
  .b2{background:var(--gold);opacity:.10;width:600px;height:600px;bottom:30%;left:-200px}
  .photo{position:absolute;inset:0;z-index:0}
  .photo img{width:100%;height:60%;object-fit:cover;object-position:center 30%}
  .photo::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(129,29,22,.3) 0%,rgba(129,29,22,.7) 45%,var(--wine) 60%,var(--wine) 100%)}
  .spark{position:absolute;color:var(--gold);z-index:2}
  .s1{top:7%;right:12%;font-size:50px}
  .s2{top:55%;right:14%;font-size:32px;opacity:.6}
  .s3{bottom:18%;left:90px;font-size:36px;opacity:.7}
  .s4{bottom:6%;right:90px;font-size:44px}
  .content{position:absolute;inset:0;z-index:2;padding:100px 90px;display:flex;flex-direction:column}
  .logo{width:110px;height:110px;border-radius:22px;overflow:hidden;border:2px solid rgba(249,245,237,.25)}
  .logo img{width:100%;height:100%;object-fit:cover}
  .eyebrow{color:var(--gold);font-size:18px;font-weight:500;letter-spacing:.35em;text-transform:uppercase;margin-top:850px}
  .title{margin-top:24px}
  .title .l1{font-size:96px;font-weight:600;line-height:1.02;letter-spacing:-.04em;color:var(--cream)}
  .title .l2{font-size:96px;font-weight:500;line-height:1.02;letter-spacing:-.04em;color:var(--pink);font-style:italic;margin-top:4px}
  .tagline{margin-top:32px;font-style:italic;color:var(--gold);font-size:28px;max-width:780px;line-height:1.4}
  .date{margin-top:50px;display:flex;align-items:flex-end;gap:24px}
  .date .num{font-size:240px;font-weight:700;line-height:.85;color:var(--gold);letter-spacing:-.06em}
  .date .meta{padding-bottom:24px}
  .date .meta .month{font-size:48px;font-weight:600;line-height:1;letter-spacing:-.02em}
  .date .meta .year{font-size:22px;color:rgba(249,245,237,.6);letter-spacing:.25em;margin-top:6px}
  .info{margin-top:50px;display:grid;grid-template-columns:1fr 1fr;gap:30px 60px;border-top:1px solid rgba(249,245,237,.18);padding-top:38px}
  .info .label{font-size:16px;letter-spacing:.25em;text-transform:uppercase;color:rgba(249,245,237,.55);margin-bottom:10px}
  .info .v{font-size:30px;font-weight:500;color:var(--cream);line-height:1.3}
  .cta{margin-top:auto;padding-top:28px;border-top:1px solid rgba(249,245,237,.18);display:flex;justify-content:space-between;align-items:center;color:rgba(249,245,237,.65);font-size:22px;letter-spacing:.2em;text-transform:uppercase}
  .cta .domain{color:var(--gold)}
</style>
</head>
<body>
  <div class="photo"><img src="src/assets/images/about.jpg" alt="" /></div>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <span class="spark s1">✦</span>
  <span class="spark s2">✦</span>
  <span class="spark s3">✦</span>
  <span class="spark s4">✦</span>
  <div class="content">
    <div class="logo"><img src="src/assets/logos/logo-instagram.jpg" alt="" /></div>
    <p class="eyebrow">Próximo evento</p>
    <div class="title">
      <div class="l1">Sculpt Society</div>
      <div class="l2">Hannah Montana<br/>Edition</div>
    </div>
    <p class="tagline">Una mañana para moverte, conectar, brillar y vivir lo mejor de ambos mundos ✦</p>
    <div class="date">
      <div class="num">13</div>
      <div class="meta"><div class="month">Junio</div><div class="year">2026</div></div>
    </div>
    <div class="info">
      <div><div class="label">Hora</div><div class="v">10:00 a.m.</div></div>
      <div><div class="label">Inversión</div><div class="v">₡20.000</div></div>
      <div><div class="label">Lugar</div><div class="v">Paloma Studios<br/>Escazú, CR</div></div>
      <div><div class="label">Incluye</div><div class="v">Yoga · Brunch ·<br/>Bedazzling Bar</div></div>
    </div>
    <div class="cta"><span>Inscripciones</span><span class="domain">sculptsocietycr.com</span></div>
  </div>
</body>
</html>
